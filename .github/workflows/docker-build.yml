---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: 🐳 Docker Build

on:
  push:
    branches:
      - '*'
    paths-ignore:
      - '**.md'
      - 'website/**'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:
    inputs:
      skip_upx:
        description: 'Skip UPX compression'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docker (${{ matrix.platform }})
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    outputs:
      digest-amd64: ${{ steps.set_outputs.outputs.digest-amd64 }}
      digest-arm64: ${{ steps.set_outputs.outputs.digest-arm64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            BUILD_BRANCH=${{ github.ref_name }}
            SKIP_UPX=${{ inputs.skip_upx && '1' || '0' }}
          outputs: |
            type=image,push-by-digest=true,name=ghcr.io/${{ env.OWNER_LC }}/ygege,push=true
          cache-from: type=gha,scope=docker-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.platform }}
          provenance: false

      - name: Set outputs
        id: set_outputs
        run: |
          platform="${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}"
          echo "digest-${platform}=${{ steps.build.outputs.digest }}" >> $GITHUB_OUTPUT

  publish:
    name: Create multi-arch manifest
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lower case owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -1 | cut -d '"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine Docker tags
        id: tags
        run: |
          BRANCH="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          # Sanitize branch name for use as Docker tag
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g' | tr '[:upper:]' '[:lower:]')

          TAGS="${SAFE_BRANCH} sha-${SHA_SHORT}"

          # Add version + latest tags for default branch
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          if [[ "$BRANCH" == "$DEFAULT_BRANCH" ]]; then
            TAGS="latest ${VERSION} ${TAGS}"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "Generated tags: $TAGS"

      - name: Create and push manifests
        run: |
          TAGS="${{ steps.tags.outputs.tags }}"
          IMAGE="ghcr.io/${{ env.OWNER_LC }}/ygege"
          for TAG in $TAGS; do
            echo "Creating manifest for tag: $TAG"
            docker manifest create ${IMAGE}:${TAG} \
              --amend ${IMAGE}@${{ needs.build.outputs.digest-amd64 }} \
              --amend ${IMAGE}@${{ needs.build.outputs.digest-arm64 }}
            docker manifest push ${IMAGE}:${TAG}
          done

      - name: Summary
        run: |
          IMAGE="ghcr.io/${{ env.OWNER_LC }}/ygege"
          TAGS="${{ steps.tags.outputs.tags }}"
          echo "## Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${IMAGE}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Architectures:** \`linux/amd64\`, \`linux/arm64\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags" >> $GITHUB_STEP_SUMMARY
          for TAG in $TAGS; do
            echo "- \`${IMAGE}:${TAG}\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick start" >> $GITHUB_STEP_SUMMARY
          FIRST_TAG=$(echo "$TAGS" | awk '{print $1}')
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${IMAGE}:${FIRST_TAG}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
